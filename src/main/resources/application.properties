spring.application.name=ecommerce
server.port=${PORT:8080}

# File Upload (T?ng gi?i h?n ?? upload ?nh tho?i mßi h?n)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# DataSource Configuration - ThÛm jdbc: vÓo tr??c bi?n m¶i tr??ng
spring.datasource.url=jdbc:${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ?Ò b? d‗ng hibernate.dialect theo log khuy?n ngh?

# S?a l?i ???ng d?n l?u file ?? ch?y ???c trÛn Render (Linux)
app.upload.dir=/app/uploads/
upload.path=/uploads/