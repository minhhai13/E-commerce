spring.application.name=E-Commerce-Shopping-Cart
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

#DataSource Configuration for SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=E_COMMERCE_FINAL;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234

#JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

