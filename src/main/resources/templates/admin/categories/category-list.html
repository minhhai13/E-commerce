<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead('Categories')}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: adminLayout('Categories', ~{::main})}">
        <main>
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">Category List</h5>
                <a th:href="@{/admin/categories/form}" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-plus me-1"></i>Add Category
                </a>
            </div>

            <div th:replace="~{fragments/admin-layout :: alerts}"></div>

            <!-- Search bar -->
            <form th:action="@{/admin/categories}" method="get" class="d-flex gap-2 mb-3">
                <input type="text" name="q" class="form-control" style="max-width:340px" placeholder="Search by name…"
                    th:value="${q}" />
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-magnifying-glass me-1"></i>Search
                </button>
                <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-rotate-left me-1"></i>Reset
                </a>
            </form>

            <!-- Table -->
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categoriesPage.content}">
                                <td th:text="${cat.id}"></td>
                                <td th:text="${cat.name}"></td>
                                <td th:text="${cat.description != null ? cat.description : '—'}"></td>
                                <td>
                                    <span th:if="${cat.active}" class="badge text-bg-success">Active</span>
                                    <span th:unless="${cat.active}" class="badge text-bg-secondary">Inactive</span>
                                </td>
                                <td class="text-center">
                                    <!-- Toggle Status -->
                                    <form th:action="@{/admin/categories/toggle/{id}(id=${cat.id})}" method="post"
                                        class="d-inline">
                                        <input type="hidden" name="q" th:value="${q}" />
                                        <input type="hidden" name="page" th:value="${currentPage}" />
                                        <button type="submit" th:title="${cat.active} ? 'Deactivate' : 'Activate'"
                                            th:class="${cat.active} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'">
                                            <i
                                                th:class="${cat.active} ? 'fa-solid fa-ban' : 'fa-solid fa-circle-check'"></i>
                                        </button>
                                    </form>
                                    <!-- Edit -->
                                    <a th:href="@{/admin/categories/form(id=${cat.id})}"
                                        class="btn btn-sm btn-outline-primary ms-1" title="Edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${categoriesPage.content.empty}">
                                <td colspan="5" class="text-center text-muted py-4">No categories found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <nav th:if="${categoriesPage.totalPages > 1}" class="mt-3">
                <ul class="pagination pagination-sm mb-0">
                    <li th:classappend="${categoriesPage.first} ? 'disabled'" class="page-item">
                        <a class="page-link" th:href="@{/admin/categories(q=${q}, page=${currentPage - 1})}">
                            <i class="fa-solid fa-angle-left"></i>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, categoriesPage.totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'" class="page-item">
                        <a class="page-link" th:href="@{/admin/categories(q=${q}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li th:classappend="${categoriesPage.last} ? 'disabled'" class="page-item">
                        <a class="page-link" th:href="@{/admin/categories(q=${q}, page=${currentPage + 1})}">
                            <i class="fa-solid fa-angle-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Summary -->
            <div class="text-muted small mt-2">
                Showing
                <span th:text="${categoriesPage.numberOfElements}">0</span> /
                <span th:text="${categoriesPage.totalElements}">0</span> records
            </div>

        </main>
    </div>

    <div th:replace="~{fragments/admin-layout :: adminScripts}"></div>
</body>

</html>
