<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead(${formTitle})}"></head>

<body>

<div th:replace="~{fragments/admin-layout :: adminLayout(${formTitle}, ~{::main})}">
    <main>
        <div th:replace="~{fragments/admin-layout :: alerts}"></div>

        <form th:action="@{/admin/coupons/save}" method="post" th:object="${couponRequest}">
            <input type="hidden" name="couponId" th:value="${couponId}" />

            <div class="mb-3">
                <label class="form-label">Mã khuyến mãi</label>
                <input type="text" th:field="*{code}" class="form-control" />
                <div th:if="${#fields.hasErrors('code')}" class="text-danger small" th:errors="*{code}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Loại giảm giá</label>
                <select th:field="*{discountType}" class="form-select">
                    <option th:each="t: ${discountTypes}" th:value="${t}" th:text="${t.name()}"></option>
                </select>
                <div th:if="${#fields.hasErrors('discountType')}" class="text-danger small" th:errors="*{discountType}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Giá trị</label>
                <input type="number" step="0.01" th:field="*{discountValue}" class="form-control" />
                <div th:if="${#fields.hasErrors('discountValue')}" class="text-danger small" th:errors="*{discountValue}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Giới hạn sử dụng</label>
                <input type="number" th:field="*{usageLimit}" class="form-control" />
                <div th:if="${#fields.hasErrors('usageLimit')}" class="text-danger small" th:errors="*{usageLimit}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Từ ngày</label>
                <input type="datetime-local" th:field="*{validFrom}" class="form-control" />
                <div th:if="${#fields.hasErrors('validFrom')}" class="text-danger small" th:errors="*{validFrom}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Đến ngày</label>
                <input type="datetime-local" th:field="*{validUntil}" class="form-control" />
                <div th:if="${#fields.hasErrors('validUntil')}" class="text-danger small" th:errors="*{validUntil}"></div>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{isActive}" class="form-check-input" />
                <label class="form-check-label">Hoạt động</label>
            </div>

            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/admin/coupons}" class="btn btn-secondary ms-2">Hủy</a>
        </form>
    </main>
</div>

<div th:replace="~{fragments/admin-layout :: adminScripts}"></div>
</body>

</html>
