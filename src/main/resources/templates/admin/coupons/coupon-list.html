<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead('Quản lý khuyến mãi')}"></head>

<body>

<div th:replace="~{fragments/admin-layout :: adminLayout('Quản lý khuyến mãi', ~{::main})}">
    <main>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Danh sách khuyến mãi</h5>
            <a th:href="@{/admin/coupons/form}" class="btn btn-primary btn-sm">
                <i class="fa-solid fa-plus me-1"></i>Thêm khuyến mãi
            </a>
        </div>

        <div th:replace="~{fragments/admin-layout :: alerts}"></div>

        <!-- Search bar -->
        <form th:action="@{/admin/coupons}" method="get" class="d-flex gap-2 mb-3">
            <input type="text" name="q" class="form-control" style="max-width:340px"
                   placeholder="Tìm theo mã…" th:value="${q}" />
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-magnifying-glass me-1"></i>Tìm
            </button>
            <a th:href="@{/admin/coupons}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-rotate-left me-1"></i>Xoá lọc
            </a>
        </form>

        <!-- Table -->
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Mã</th>
                        <th>Loại</th>
                        <th>Giá trị</th>
                        <th>Hạn sử dụng</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${couponsPage.content}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.code}"></td>
                        <td th:text="${c.discountType.name()}"></td>
                        <td th:text="${c.discountType.name() == 'PERCENTAGE'} ? ${c.discountValue} + '%' : ${c.discountValue}"></td>
                        <td th:text="${#temporals.format(c.validUntil,'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span th:if="${c.active}" class="badge text-bg-success">Active</span>
                            <span th:unless="${c.active}" class="badge text-bg-secondary">Disabled</span>
                        </td>
                        <td class="text-center">
                            <form th:action="@{/admin/coupons/toggle/{id}(id=${c.id})}" method="post" class="d-inline">
                                <input type="hidden" name="q" th:value="${q}" />
                                <input type="hidden" name="page" th:value="${currentPage}" />
                                <button type="submit" th:title="${c.active} ? 'Vô hiệu hoá' : 'Kích hoạt'"
                                        th:class="${c.active} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'">
                                    <i th:class="${c.active} ? 'fa-solid fa-ban' : 'fa-solid fa-circle-check'"></i>
                                </button>
                            </form>
                            <a th:href="@{/admin/coupons/form(id=${c.id})}"
                               class="btn btn-sm btn-outline-primary ms-1" title="Chỉnh sửa">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${couponsPage.content.empty}">
                        <td colspan="7" class="text-center text-muted py-4">
                            Không tìm thấy khuyến mãi nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${couponsPage.totalPages > 1}" class="mt-3">
            <ul class="pagination pagination-sm mb-0">
                <li th:classappend="${couponsPage.first} ? 'disabled'" class="page-item">
                    <a class="page-link" th:href="@{/admin/coupons(q=${q}, page=${currentPage - 1})}">
                        <i class="fa-solid fa-angle-left"></i>
                    </a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, couponsPage.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'" class="page-item">
                    <a class="page-link" th:href="@{/admin/coupons(q=${q}, page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li th:classappend="${couponsPage.last} ? 'disabled'" class="page-item">
                    <a class="page-link" th:href="@{/admin/coupons(q=${q}, page=${currentPage + 1})}">
                        <i class="fa-solid fa-angle-right"></i>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="text-muted small mt-2">
            Hiển thị
            <span th:text="${couponsPage.numberOfElements}">0</span> /
            <span th:text="${couponsPage.totalElements}">0</span> bản ghi
        </div>

    </main>
</div>

<div th:replace="~{fragments/admin-layout :: adminScripts}"></div>
</body>

</html>
