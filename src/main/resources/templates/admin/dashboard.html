<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead('Dashboard')}"></head>

<body>

    <div th:replace="~{fragments/admin-layout :: adminLayout('Dashboard', ~{::main})}">
        <main>
            <h5 class="fw-bold mb-4">Tổng quan hệ thống</h5>

            <div th:replace="~{fragments/admin-layout :: alerts}"></div>

            <!-- Stat Cards -->
            <div class="row g-4 mb-4">
                <!-- Total Users -->
                <div class="col-sm-6 col-xl-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle p-3 bg-primary bg-opacity-10 text-primary">
                                <i class="fa-solid fa-users fa-xl"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Tổng người dùng</div>
                                <div class="fs-4 fw-bold" th:text="${totalUsers}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Total Orders -->
                <div class="col-sm-6 col-xl-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle p-3 bg-success bg-opacity-10 text-success">
                                <i class="fa-solid fa-receipt fa-xl"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Tổng đơn hàng</div>
                                <div class="fs-4 fw-bold" th:text="${totalOrders}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Total Products -->
                <div class="col-sm-6 col-xl-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle p-3 bg-warning bg-opacity-10 text-warning">
                                <i class="fa-solid fa-box fa-xl"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Tổng sản phẩm</div>
                                <div class="fs-4 fw-bold" th:text="${totalProducts}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Total Coupons -->
                <div class="col-sm-6 col-xl-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle p-3 bg-danger bg-opacity-10 text-danger">
                                <i class="fa-solid fa-tag fa-xl"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Tổng coupon</div>
                                <div class="fs-4 fw-bold" th:text="${totalCoupons}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Revenue card -->
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle p-3 bg-info bg-opacity-10 text-info">
                        <i class="fa-solid fa-sack-dollar fa-xl"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Doanh thu (đơn hoàn thành)</div>
                        <div class="fs-4 fw-bold"
                            th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/admin-layout :: adminScripts}"></div>
</body>

</html>
