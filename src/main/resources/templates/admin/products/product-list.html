<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead('Products')}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: adminLayout('Products', ~{::main})}">
        <main>
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">Product List</h5>
                <a th:href="@{/admin/products/form}" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-plus me-1"></i>Add Product
                </a>
            </div>

            <div th:replace="~{fragments/admin-layout :: alerts}"></div>

            <!-- Search & Filter -->
            <form th:action="@{/admin/products}" method="get" class="d-flex flex-wrap gap-2 mb-3">
                <input type="text" name="q" class="form-control" style="max-width:260px" placeholder="Search by name…"
                    th:value="${q}" />
                <select name="categoryId" class="form-select" style="max-width:200px">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                        th:selected="${cat.id == selectedCategoryId}"></option>
                </select>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-magnifying-glass me-1"></i>Search
                </button>
                <a th:href="@{/admin/products}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-rotate-left me-1"></i>Reset
                </a>
            </form>

            <!-- Table -->
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${productsPage.content}">
                                <td th:text="${p.id}"></td>
                                <td>
                                    <img th:if="${p.imageName != null and !#strings.isEmpty(p.imageName)}"
                                        th:src="${p.imageName}" alt="Product"
                                        style="width:50px;height:50px;object-fit:cover;border-radius:4px;" />
                                    <span th:unless="${p.imageName != null and !#strings.isEmpty(p.imageName)}"
                                        class="text-muted small">—</span>
                                </td>
                                <td th:text="${p.name}"></td>
                                <td th:text="${p.category != null ? p.category.name : '—'}"></td>
                                <td th:text="${#numbers.formatDecimal(p.price, 1, 'COMMA', 2, 'POINT')}"></td>
                                <td th:text="${p.stockQuantity}"></td>
                                <td>
                                    <span th:if="${p.active}" class="badge text-bg-success">Active</span>
                                    <span th:unless="${p.active}" class="badge text-bg-secondary">Inactive</span>
                                </td>
                                <td class="text-center">
                                    <!-- Toggle Status -->
                                    <form th:action="@{/admin/products/toggle/{id}(id=${p.id})}" method="post"
                                        class="d-inline">
                                        <input type="hidden" name="q" th:value="${q}" />
                                        <input type="hidden" name="page" th:value="${currentPage}" />
                                        <button type="submit" th:title="${p.active} ? 'Deactivate' : 'Activate'"
                                            th:class="${p.active} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'">
                                            <i
                                                th:class="${p.active} ? 'fa-solid fa-ban' : 'fa-solid fa-circle-check'"></i>
                                        </button>
                                    </form>
                                    <!-- Edit -->
                                    <a th:href="@{/admin/products/form(id=${p.id})}"
                                        class="btn btn-sm btn-outline-primary ms-1" title="Edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${productsPage.content.empty}">
                                <td colspan="8" class="text-center text-muted py-4">No products found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <nav th:if="${productsPage.totalPages > 1}" class="mt-3">
                <ul class="pagination pagination-sm mb-0">
                    <li th:classappend="${productsPage.first} ? 'disabled'" class="page-item">
                        <a class="page-link" th:href="@{/admin/products(q=${q}, page=${currentPage - 1})}">
                            <i class="fa-solid fa-angle-left"></i>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, productsPage.totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'" class="page-item">
                        <a class="page-link" th:href="@{/admin/products(q=${q}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li th:classappend="${productsPage.last} ? 'disabled'" class="page-item">
                        <a class="page-link" th:href="@{/admin/products(q=${q}, page=${currentPage + 1})}">
                            <i class="fa-solid fa-angle-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Summary -->
            <div class="text-muted small mt-2">
                Showing
                <span th:text="${productsPage.numberOfElements}">0</span> /
                <span th:text="${productsPage.totalElements}">0</span> records
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/admin-layout :: adminScripts}"></div>
</body>

</html>
