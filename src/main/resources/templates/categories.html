<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop By Category - ShopZone</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --surface: #FFFFFF;
            --background: #F8FAFC;
            --text: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── TOP NAV ── */
        .topnav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            position: relative;
            padding: 6rem 5%;
            text-align: center;
            background: linear-gradient(135deg, #1E293B, #0F172A);
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .page-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .page-subtitle {
            color: #CBD5E1;
            font-size: 1.25rem;
            max-width: 600px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* ── CATEGORY GRID ── */
        .category-container {
            width: 100%;
            margin: 4rem 0;
            padding: 0 2%;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .category-card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4/5;
            text-decoration: none;
            display: flex;
            align-items: flex-end;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
        }

        /* Generate different backgrounds based on category name conceptually */
        .cat-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.2), transparent);
            z-index: 2;
            transition: opacity 0.5s ease;
        }

        .category-card:hover .cat-bg {
            transform: scale(1.08);
        }

        .cat-content {
            position: relative;
            z-index: 3;
            padding: 2.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cat-title {
            color: white;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            transform: translateY(0);
            transition: transform 0.4s ease;
        }

        .cat-cta {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .category-card:hover .cat-cta {
            opacity: 1;
            gap: 1rem;
            /* push arrow out */
        }

        /* Inline logic for generic covers if actual DB has no images */
        .cat-1 {
            background-image: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800&auto=format&fit=crop');
        }

        .cat-2 {
            background-image: url('https://images.unsplash.com/photo-1543163521-1bf539c55dd2?q=80&w=800&auto=format&fit=crop');
        }

        .cat-3 {
            background-image: url('https://images.unsplash.com/photo-1514989940723-e8e51635b782?q=80&w=800&auto=format&fit=crop');
            /* Kids shoes */
        }

        .cat-4 {
            background-image: url('https://images.unsplash.com/photo-1560769629-975ec94e6a86?q=80&w=800&auto=format&fit=crop');
        }
    </style>
</head>

<body>

    <!-- ═══ TOP NAVIGATION ═══ -->
    <nav class="topnav">
        <a class="logo" th:href="@{/}"><span>Shop</span>Zone</a>

        <div class="nav-links">
            <a th:href="@{/}" class="nav-link">Home</a>
            <a th:href="@{/shop}" class="nav-link">Shop</a>
            <a th:href="@{/categories}" class="nav-link active">Categories</a>
            <a th:href="@{/#about}" class="nav-link">About Us</a>
        </div>
    </nav>

    <!-- ═══ PAGE HEADER ═══ -->
    <header class="page-header">
        <div class="header-content">
            <h1 class="page-title">Shop by Category</h1>
            <p class="page-subtitle">Find exactly what you're looking for by browsing our curated collections.</p>
        </div>
    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="category-container">

        <div class="category-grid">

            <a th:each="cat, iterStat : ${categories}" th:href="@{/categories/{id}(id=${cat.id})}"
                class="category-card">
                <!-- Using a fallback class background image logic based on index or category ID for aesthetics -->
                <div class="cat-bg" th:classappend="'cat-' + (${iterStat.index % 4 + 1})"></div>

                <div class="cat-overlay"></div>

                <div class="cat-content">
                    <h2 class="cat-title" th:text="${cat.name}">Category Name</h2>
                    <span class="cat-cta">
                        Shop Collection
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                        </svg>
                    </span>
                </div>
            </a>

            <!-- Empty state fallback -->
            <div th:if="${categories == null or categories.isEmpty()}"
                style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted);">
                <h3>No categories found.</h3>
            </div>
        </div>

    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer id="about"
        style="background: var(--surface); border-top: 1px solid var(--border); padding: 5rem 5%; margin-top: auto;">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between;">
            <div>
                <a class="logo" th:href="@{/}" style="margin-bottom: 1rem;"><span>Shop</span>Zone</a>
                <p style="color: var(--text-muted); max-width: 400px; margin-top: 1rem;">We are a premium destination
                    for quality shopping.</p>
            </div>
            <div style="color: var(--text-muted); text-align: right;">
                <p>© 2026 ShopZone. All rights reserved.</p>
            </div>
        </div>
    </footer>

</body>

</html>
