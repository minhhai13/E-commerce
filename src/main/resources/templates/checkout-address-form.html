<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật Địa chỉ – ShopZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text: #0F172A;
            --text-muted: #64748B;
            --error: #EF4444;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        .topnav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 5%;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-btn {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            border: 1px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .cart-btn:hover {
            background: var(--primary);
            color: white;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .user-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 0.5rem 0.4rem 0.4rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: var(--surface);
            transition: all 0.2s;
            cursor: pointer;
        }

        .user-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #818CF8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            padding-right: 0.5rem;
        }

        /* ── DROPDOWN ── */
        .user-dropdown-container {
            position: relative;
            display: inline-block;
        }

        .user-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--surface);
            min-width: 160px;
            box-shadow: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            z-index: 1000;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .user-dropdown-container:hover .user-dropdown-menu {
            display: block;
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.25rem;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .user-dropdown-item:hover {
            background-color: #F1F5F9;
            color: var(--primary);
        }

        .user-dropdown-item.danger:hover {
            background-color: #FEF2F2;
            color: #EF4444;
        }

        /* ── CATEGORY DROPDOWN ── */
        .nav-item-dropdown {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            min-width: 220px;
            box-shadow: var(--shadow-md);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 0.75rem 0;
            z-index: 1100;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .nav-item-dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .dropdown-item svg {
            width: 14px;
            height: 14px;
            opacity: 0.5;
        }

        .page-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px #EEF2FF;
        }

        .error-text {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-weight: 500;
            background: #FEF2F2;
            color: #B91C1C;
            border: 1px solid #FECACA;
        }
    </style>
</head>

<body>

    <nav class="topnav">
        <a class="logo" th:href="@{/}"><span>Shop</span>Zone</a>

        <div class="nav-links">
            <a th:href="@{/}" class="nav-link">Home</a>
            <a th:href="@{/shop}" class="nav-link">Shop</a>
            <div class="nav-item-dropdown">
                <a th:href="@{/categories}" class="nav-link">Categories</a>
                <div class="dropdown-menu">
                    <a th:each="cat : ${allParentCategories}" th:href="@{/shop(category=${cat.id})}"
                        class="dropdown-item">
                        <span th:text="${cat.name}">Category</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
            </div>
            <a th:href="@{/#about}" class="nav-link">About Us</a>
        </div>

        <div class="nav-actions">
            <a th:href="@{/cart}" class="cart-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <div class="cart-badge" th:if="${cartItemCount != null and cartItemCount > 0}"
                    th:text="${cartItemCount}">0</div>
            </a>

            <div th:if="${profileInfo != null}" class="user-dropdown-container">
                <a href="#" class="user-btn">
                    <div class="avatar"
                        th:text="${profileInfo.fullName != null} ? ${#strings.substring(profileInfo.fullName,0,1)} : 'U'">
                        U
                    </div>
                    <div class="user-name" th:text="${profileInfo.fullName}">User</div>
                </a>
                <div class="user-dropdown-menu">
                    <a th:href="@{/profile}" class="user-dropdown-item">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px; height:16px">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        My Profile
                    </a>
                    <a th:href="@{/logout}" class="user-dropdown-item danger">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px; height:16px">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        Logout
                    </a>
                </div>
            </div>
            <a th:unless="${profileInfo != null}" th:href="@{/login}" class="user-btn" style="padding: 0.5rem 1rem;">
                <span class="user-name" style="padding: 0;">Sign In</span>
            </a>
        </div>
    </nav>

    <main class="page-container">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
            <h1 class="page-title" style="margin-bottom: 0;"
                th:text="${addressId != null ? 'Edit Address' : 'Add New Address'}">Add Address</h1>
            <a th:href="@{/checkout/addresses}"
                style="display: inline-flex; align-items: center; gap: 0.4rem; color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.2s; background: var(--bg); padding: 0.4rem 0.8rem; border: 1px solid var(--border); border-radius: 99px;">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Cancel / Back
            </a>
        </div>

        <div th:if="${errorMessage}" class="alert" th:text="${errorMessage}"></div>

        <form
            th:action="${addressId != null ? '/checkout/addresses/' + addressId + '/edit' : '/checkout/addresses/add'}"
            method="post" th:object="${addressForm}">

            <div class="form-group">
                <label class="form-label">Recipient Name</label>
                <input type="text" th:field="*{recipientName}" class="form-input" required placeholder="John Doe">
                <div th:if="${#fields.hasErrors('recipientName')}" th:errors="*{recipientName}" class="error-text">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" th:field="*{phone}" class="form-input" required placeholder="0912...">
                <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error-text"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Address Details (Street, Ward, City...)</label>
                <textarea th:field="*{addressDetail}" class="form-input" rows="4" required
                    placeholder="123 Street..."></textarea>
                <div th:if="${#fields.hasErrors('addressDetail')}" th:errors="*{addressDetail}" class="error-text">
                </div>
            </div>

            <button type="submit" class="btn-primary"
                th:text="${addressId != null ? 'Update Address' : 'Add Now'}">Save</button>
        </form>
    </main>

    <footer
        style="background: var(--bg); padding: 2rem 5%; text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: auto;">
        &copy; 2026 ShopZone.
    </footer>

</body>

</html>
