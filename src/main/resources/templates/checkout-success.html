<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success – ShopZone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #EEF2FF;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text: #0F172A;
            --text-muted: #64748B;
            --success: #10B981;
            --radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .success-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
            max-width: 500px;
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #ECFDF5;
            color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .order-id {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--text);
        }

        .footer {
            margin-top: 3rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <div class="success-card">
        <div class="icon-circle">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 48px; height: 48px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 th:text="${qrUrl != null} ? 'Thanh toán hoá đơn' : 'Thank You!'">Thank You!</h1>
        <p th:text="${qrUrl != null} ? 'Vui lòng sử dụng App Ngân hàng quét QR Code bên dưới để thanh toán.' : 'Your order has been placed successfully. We will contact you soon for confirmation.'">Your order has been placed successfully. We will contact you soon for confirmation.</p>

        <div class="order-id">
            Order ID: #<span th:text="${orderId}">12345</span>
        </div>

        <div th:if="${qrUrl != null}" class="qr-container" id="qrContainer" style="margin-bottom: 2rem;">
            <img th:src="${qrUrl}" alt="Mã QR Thanh Toán SePay" style="max-width: 250px; border-radius: 12px; border: 2px solid var(--border); padding: 5px;">
        </div>
        <div id="successCheckmark" style="display: none; margin-bottom: 2rem; color: var(--success); text-align: center;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 80px; height: 80px; margin: 0 auto;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 style="margin-top: 1rem; color: var(--success);">Thanh toán thành công!</h2>
            <p style="color: var(--text-muted);">Hệ thống đã xác nhận thanh toán tự động.</p>
        </div>

        <div class="button-group">
            <a th:href="@{/profile/orders}" class="btn btn-primary">View My Orders</a>
            <a th:href="@{/shop}" class="btn btn-secondary">Continue Shopping</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 ShopZone. All rights reserved.
    </div>
    <script th:inline="javascript">
        /*[# th:if="${qrUrl != null}"]*/
        const orderId = /*[[${orderId}]]*/ null;
        if (orderId) {
            const checkInterval = setInterval(() => {
                fetch(`/api/sepay-webhook/check-status/${orderId}`)
                    .then(response => response.text())
                    .then(status => {
                        if (status !== 'WAITING_PAYMENT') {
                            clearInterval(checkInterval);
                            document.getElementById('qrContainer').style.display = 'none';
                            document.getElementById('successCheckmark').style.display = 'block';
                            document.querySelector('h1').innerText = 'Hoàn Tất!';
                            document.querySelector('h1').style.color = 'var(--success)';
                            document.querySelector('p').innerText = 'Cảm ơn bạn đã mua sắm. Đơn hàng sẽ sớm được xử lý.';
                        }
                    })
                    .catch(e => console.log('Polling error:', e));
            }, 3000); // 3 seconds interval
        }
        /*[/]*/
    </script>
</body>

</html>
