<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="staffHead(pageTitle)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Staff Panel'">Staff Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<!-- Full staff page layout fragment -->
<div th:fragment="staffLayout(pageTitle, content)" class="d-flex vh-100">

    <!-- Sidebar -->
    <nav class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width: 240px;">
        <a href="/staff/dashboard" class="text-white text-decoration-none fw-bold fs-5 mb-4 d-block">
            <i class="fa-solid fa-store me-2"></i><Staff></Staff>Staff Panel
        </a>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a th:href="@{/staff/dashboard}" th:classappend="${activePage == 'dashboard'} ? ' active'"
                   class="nav-link text-white-50">
                    <i class="fa-solid fa-gauge me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/staff/list}" th:classappend="${activePage == 'order-list'} ? ' active'"
                   class="nav-link text-white-50">
                    <i class="fa-solid fa-users me-2"></i>Order List
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/staff/inventory}" th:nclassappend="${activePage == 'order-list'} ? ' active'"
                   class="nav-link text-white-50">
                    <i class="fa-solid fa-users me-2"></i>Inventory
                </a>
            </li>
        </ul>
        <hr class="border-secondary" />
        <a href="/logout" class="nav-link text-danger">
            <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
        </a>
    </nav>

    <!-- Main Content -->
    <div class="d-flex flex-column flex-grow-1 overflow-auto bg-light">
        <!-- Top bar -->
        <header class="bg-white border-bottom px-4 py-2 d-flex align-items-center">
            <span class="fw-semibold text-muted me-auto" th:text="${pageTitle}">Page Title</span>
            <span class="text-secondary small">
                <i class="fa-solid fa-circle-user me-1"></i>
                <span th:text="${session.loggedInUser?.fullName}">Staff</span>
            </span>
        </header>
        <!-- Page content -->
        <div class="p-4 flex-grow-1">
            <th:block th:replace="${content}" />
        </div>
    </div>

</div>

<!-- Reusable flash-message alerts fragment -->
<div th:fragment="alerts">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<th:block th:fragment="staffScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
