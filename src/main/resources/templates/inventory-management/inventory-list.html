<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{fragments/staff-layout :: staffHead('Danh sách tồn kho')}">
        <meta charset="UTF-8">
        <title>Danh sách tồn kho</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body th:insert="~{fragments/staff-layout :: staffLayout('Danh sách tồn kho', ~{::content})}">
        <div th:fragment="content" class="container mt-4">
            <div th:if="${status != null}"
                 class="alert alert-dismissible fade show"
                 th:classappend="${#strings.contains(status, 'thành công') ? 'alert-success' : 'alert-danger'}"
                 role="alert">
                <span th:text="${status}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Hình ảnh</th>
                        <th scope="col">Tên sản phẩm</th>
                        <th scope="col">Danh mục</th>
                        <th scope="col">Giá tiền</th>
                        <th scope="col">Tồn kho</th>
                        <th scope="col">Trạng thái</th>
                        <th scope="col" class="text-center">Hành dộng</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p, iterStat : ${product_list}">
                        <th scope="row" th:text="${iterStat.count}"></th>

                        <td>
                            <span th:if="${p.imageName == null or p.imageName == ''}">—</span>
                            <img th:if="${p.imageName != null and p.imageName != ''}"
                                 th:src="@{'/images/' + ${p.imageName}}" width="40" height="40" class="rounded">
                        </td>

                        <td th:text="${p.name}"></td>
                        <td th:text="${p.category.name}"></td>
                        <td th:text="${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                        <td th:text="${p.stockQuantity}"></td>

                        <td>
                            <span th:if="${p.isActive}" class="badge bg-success">Hoạt động</span>
                            <span th:unless="${p.isActive}" class="badge bg-secondary">Đang tạm dừng</span>
                        </td>

                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <form th:action="@{/staff/inventory/delete/{id}(id=${p.id})}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa?')">
                                    <button type="submit" class="btn btn-outline-danger btn-sm p-2 line-height-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-slash-circle" viewBox="0 0 16 16">
                                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                                            <path d="M11.354 4.646a.5.5 0 0 0-.708 0l-6 6a.5.5 0 0 0 .708.708l6-6a.5.5 0 0 0 0-.708"/>
                                        </svg>
                                    </button>
                                </form>

                                <a th:href="@{/staff/inventory/update/{id}(id=${p.id})}" class="btn btn-outline-primary btn-sm p-2 line-height-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill" viewBox="0 0 16 16">
                                        <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
                                    </svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </body>
</html>
