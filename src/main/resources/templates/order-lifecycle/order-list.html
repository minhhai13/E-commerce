<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/staff-layout :: staffHead('Danh sách đơn hàng')}">
    <meta charset="UTF-8">
    <title>Danh sách đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" th:insert="~{fragments/staff-layout :: staffLayout('Danh sách đơn hàng', ~{::content})}">
    <div th:fragment="content">
        <div class="container-fluid mt-5 px-5">
            <div th:if="${status}" class="alert alert-info alert-dismissible fade show" role="alert">
                <span th:text="${status}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div>
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>#Id</th>
                        <th>Tên khách hàng</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${order_list}">
                        <th scope="row">#<span th:text="${order.id}"></span></th>
                        <td><span th:text="${order.shippingName}"></span></td>
                        <td><span th:text="${order.totalAmount}"></span></td>
                        <td>
                            <span class="badge bg-warning text-dark" th:if="${order.status?.name() == 'WAITING_CONFIRMATION'}">1 - Chờ xác nhận</span>
                            <span class="badge bg-info text-white" th:if="${order.status?.name() == 'WAITING_PICKUP'}">2 - Chờ lấy hàng</span>
                            <span class="badge bg-primary" th:if="${order.status?.name() == 'IN_TRANSIT'}">3 - Đang giao</span>
                            <span class="badge bg-success" th:if="${order.status?.name() == 'COMPLETED'}">4 - Hoàn thành</span>
                            <span class="badge bg-danger" th:if="${order.status?.name() == 'CANCELLED'}">0 - Đã hủy</span>
                        </td>
                        <td>
                            <a th:href="@{/staff/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                Xem chi tiết
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(order_list)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            Không có đơn hàng nào trong hệ thống.
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
