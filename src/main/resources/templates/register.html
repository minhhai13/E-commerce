<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký | E-Commerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm login-card">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4 fw-bold">Đăng ký tài khoản</h4>

            <div th:if="${success}" class="alert alert-success" role="alert">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-semibold">Họ và tên</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                            placeholder="Nhập họ và tên"
                            th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Nhập email"
                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">Số điện thoại</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                        <input type="text" id="phone" th:field="*{phone}" class="form-control"
                            placeholder="Nhập số điện thoại"
                            th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" th:field="*{password}" class="form-control"
                            placeholder="Nhập mật khẩu"
                            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                        th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'" />
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <input type="hidden" name="role" value="CUSTOMER" />

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    Đăng ký <i class="fa-solid fa-user-plus ms-1"></i>
                </button>
                <div class="text-center mt-3">
                    <p class="mb-0">Đã có tài khoản? <a th:href="@{/login}"
                            class="text-decoration-none fw-semibold">Đăng nhập ngay</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
